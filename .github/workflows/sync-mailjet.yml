name: Sync MailJet Campaigns

on:
  schedule:
    - cron: "0 17 * * *" # Daily at noon ET (UTC-5)
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-actions-sync
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Sync MailJet campaigns
        env:
          MJ_APIKEY_PUBLIC: ${{ secrets.MJ_APIKEY_PUBLIC }}
          MJ_APIKEY_PRIVATE: ${{ secrets.MJ_APIKEY_PRIVATE }}
        run: uv run sync_mailjet.py

      - name: Check for changes
        id: changes
        run: |
          git add archive/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with new campaigns
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync-mailjet/$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "Add new MailJet campaigns $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Sync MailJet campaigns $(date +%Y-%m-%d)" \
            --body "Automated sync of new MailJet campaigns." \
            --base main \
            --head "$BRANCH"
